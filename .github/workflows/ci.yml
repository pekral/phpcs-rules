name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Checks (PHP 8.5)
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: PHP tests
        run: composer test

      - name: PHPCS Validation
        run: composer check

      - name: PHPStan
        run: composer phpstan

      - name: Rector (PHP Legacy)
        run: composer rector

      - name: Check unused sniffs
        run: composer check-unused-sniffs