<?xml version="1.0" encoding="UTF-8"?>
<!-- INERT FIXTURE — DO NOT OPEN IN A BROWSER OR SERVE INLINE
     Purpose: tests that SVG sanitizers strip <foreignObject> which can embed arbitrary HTML.
     Threat: <foreignObject> with embedded HTML allows the same XSS attack surface as inline HTML;
     it is not blocked by serving SVG via <img src> in all browsers. -->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xhtml="http://www.w3.org/1999/xhtml">
  <circle cx="50" cy="50" r="40" fill="blue"/>
  <foreignObject width="200" height="100">
    <xhtml:div>
      <xhtml:script>alert(document.domain)</xhtml:script>
    </xhtml:div>
  </foreignObject>
</svg>
